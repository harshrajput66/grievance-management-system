<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — GMS Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

<div class="auth-card" style="max-width:480px">
  <div class="auth-logo">
    <div class="logo-icon">🏛️</div>
    <h4>Create Your Account</h4>
    <p>Join the Grievance Management System</p>
  </div>

  <div id="alert-box"></div>

  <form id="register-form" autocomplete="off">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="name" class="form-control" placeholder="Rajesh Kumar" required />
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="9876543210" maxlength="10" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input type="email" id="email" class="form-control" placeholder="rajesh@example.com" required />
    </div>

    <div class="form-group">
      <label class="form-label">Address</label>
      <input type="text" id="address" class="form-control" placeholder="Sector 15, Delhi - 110001" />
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required />
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" id="confirm-password" class="form-control" placeholder="Repeat password" required />
      </div>
    </div>

    <button type="submit" id="submit-btn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:6px">
      🚀 Create Account
    </button>
  </form>

  <div class="auth-divider">Already have an account?</div>
  <a href="/login" class="btn btn-outline" style="width:100%;justify-content:center">👤 Sign In Instead</a>

  <p style="text-align:center;font-size:0.72rem;color:#9ca3af;margin-top:16px">
    🔒 Your data is encrypted and secured with JWT authentication
  </p>
</div>

<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    window.location.href = Auth.isAdmin() ? '/admin/dashboard' : '/user/dashboard';
  }

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    const alertBox = document.getElementById('alert-box');
    alertBox.innerHTML = '';

    if (password !== confirmPassword) {
      alertBox.innerHTML = `<div class="alert alert-danger">❌ Passwords do not match.</div>`;
      return;
    }

    if (password.length < 6) {
      alertBox.innerHTML = `<div class="alert alert-danger">❌ Password must be at least 6 characters.</div>`;
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="loading-spinner"></span> Creating Account...`;

    const { ok, data } = await API.post('/auth/register', { name, email, phone, address, password });

    btn.disabled = false;
    btn.innerHTML = '🚀 Create Account';

    if (ok && data.success) {
      Auth.save(data.token, data.user);
      alertBox.innerHTML = `<div class="alert alert-success">✅ Account created! Redirecting...</div>`;
      setTimeout(() => window.location.href = '/user/dashboard', 1200);
    } else {
      alertBox.innerHTML = `<div class="alert alert-danger">❌ ${data.message}</div>`;
    }
  });
</script>
</body>
</html>
